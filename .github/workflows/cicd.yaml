name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: self-hosted

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2️⃣ Setup Node.js
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      # 3️⃣ Install dependencies
      - name: Install Dependencies
        shell: powershell
        run: npm install

      # 4️⃣ Smoke test
      - name: Smoke Test
        shell: powershell
        run: |
          Start-Process node index.js
          Start-Sleep -Seconds 5

      # 5️⃣ Docker login to Docker Hub
      - name: Login to DockerHub
        shell: powershell
        run: |
          docker login -u "${{ secrets.DOCKER_USERNAME }}" -p "${{ secrets.DOCKER_PASSWORD }}"

      # 6️⃣ Build Docker image
      - name: Build Docker Image
        shell: powershell
        run: |
          $imageName = "${{ secrets.DOCKER_USERNAME }}/simple-express-app-cicd:latest"
          Write-Host "Building Docker image: $imageName"
          docker build -t $imageName .

      # 7️⃣ Push Docker image to Docker Hub
      - name: Push Docker Image
        shell: powershell
        run: |
          $imageName = "${{ secrets.DOCKER_USERNAME }}/simple-express-app-cicd:latest"
          docker push $imageName

  deploy:
    needs: build
    runs-on: self-hosted

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2️⃣ Setup kubeconfig for kind
      - name: Set Kubeconfig
        shell: powershell
        run: |
          mkdir $HOME\.kube -ErrorAction SilentlyContinue
          echo "${{ secrets.KUBECONFIG }}" > $HOME\.kube\config

      # 3️⃣ Pull Docker image from Docker Hub into kind
      - name: Pull Docker image into kind
        shell: powershell
        run: |
          $imageName = "${{ secrets.DOCKER_USERNAME }}/simple-express-app-cicd:latest"
          kind load docker-image $imageName

      # 4️⃣ Deploy to Kubernetes
      - name: Deploy to Kubernetes
        shell: powershell
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml