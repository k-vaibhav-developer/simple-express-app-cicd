name: CI/CD Pipeline - Windows Self-Hosted runner

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install
        shell: powershell

      - name: Smoke Test
        run: |
          Start-Process -NoNewWindow node index.js
          Start-Sleep -Seconds 5
        shell: powershell

      - name: Build and Load Docker Image into kind
        shell: powershell
        run: |
          # Build Docker image
          docker build -t "$env:DOCKER_USERNAME/simple-express-app-cicd:latest" .

          # Load image into kind cluster
          kind load docker-image "$env:DOCKER_USERNAME/simple-express-app-cicd:latest"

      - name: Push Docker Image (Optional)
        run: docker push "${{ secrets.DOCKER_USERNAME }}/simple-express-app-cicd:latest"
        shell: powershell
        

      - name: Load Docker image into kind
        run: kind load docker-image "${{ secrets.DOCKER_USERNAME }}/simple-express-app-cicd:latest"
        shell: powershell

  deploy:
    needs: build
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set Kubeconfig
        shell: powershell
        run: |
          $kubeDir = "$env:USERPROFILE\.kube"
          if (-not (Test-Path $kubeDir)) { New-Item -ItemType Directory -Path $kubeDir }
          [System.IO.File]::WriteAllText("$kubeDir\config", $env:KUBECONFIG)

      - name: Deploy to Kubernetes
        shell: powershell
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml