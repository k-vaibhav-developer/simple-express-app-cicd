name: CI/CD Pipeline - Windows Self-Hosted

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install
        shell: pwsh

      - name: Smoke Test
        run: |
          Start-Process -NoNewWindow node index.js
          Start-Sleep -Seconds 5
        shell: pwsh

      - name: Build Docker Image
        run: docker build -t "${{ secrets.DOCKER_USERNAME }}/simple-express-app-cicd:latest" .
        shell: pwsh

      - name: Login to DockerHub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
        shell: pwsh

      - name: Push Docker Image (Optional)
        run: docker push "${{ secrets.DOCKER_USERNAME }}/simple-express-app-cicd:latest"
        shell: pwsh

      - name: Load Docker image into kind
        run: kind load docker-image "${{ secrets.DOCKER_USERNAME }}/simple-express-app-cicd:latest"
        shell: pwsh

  deploy:
    needs: build
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set Kubeconfig
        shell: pwsh
        run: |
          $kubeDir = "$env:USERPROFILE\.kube"
          if (-not (Test-Path $kubeDir)) { New-Item -ItemType Directory -Path $kubeDir }
          [System.IO.File]::WriteAllText("$kubeDir\config", $env:KUBECONFIG)

      - name: Deploy to Kubernetes
        shell: pwsh
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml